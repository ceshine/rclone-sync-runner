name: Run unit tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.13"

      - name: Python lint (Ruff)
        run: |
          uvx ruff check .
          uvx ruff format --check .

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Run pytest suite
        run: uv run pytest -v
